syntax = "proto3";

// Tracker wire protocol -- single source of truth (v3).
//
// The firmware encodes these with nanopb (generated C), and the CoAP server
// decodes with the Python protobuf runtime. One .proto, both ends. Edit here,
// regenerate, never edit generated code.
//
// Transport: CoAP NON POST /obs, application/octet-stream, No-Response option
// (no downlink). One datagram = one Obs. Keep an Obs under the safe cellular
// MTU (~512 B) so UDP never fragments.
//
// The point count of a segment MUST be decided BEFORE encoding, never capped
// mid-encode. Packed arrays are length-prefixed and written field-by-field (all
// dlat, then all dlon, then all spd_dms), each by its own callback, so stopping
// partway would truncate one array and leave the others full -- the parallel
// arrays would no longer align and the server could not pair them. The firmware
// therefore chunks a flush into segments of at most 50 points (worst case
// ~7.7 B/point -> ~385 B, safely under 512 even on IPv6); a longer flush emits
// several datagrams, each a self-contained segment with its own anchor.
//
// Time model (unchanged from v2 and deliberate): the device has no wall clock.
// Each Entry carries age_s = seconds before the datagram was sent. The server
// timestamps it received_ts - age_s. For a track segment, age_s is the age of
// the ANCHOR (oldest point); point i's time = received_ts - age_s + i*dt_ms.
// A wrong device clock would write plausible-but-wrong history; an age can only
// be off by the uplink flight time.
//
// Extensibility: field numbers are the contract. NEVER reuse a retired number.
// Adding a new field (including a new packed per-point array, e.g. lean angle)
// is backward-compatible: old decoders skip it, the parallel arrays stay
// index-aligned. That is the whole reason this is protobuf and not a packed
// blob.

// Full GNSS fix. Used as a track segment's anchor (absolute position); a lone
// fix is just a TrackSegment with empty delta arrays.
message GpsFix {
  sint32 lat_e7   = 1;   // degrees * 1e7
  sint32 lon_e7   = 2;   // degrees * 1e7
  sint32 alt_dm   = 3;   // decimetres
  uint32 acc_dm   = 4;   // decimetres
  uint32 spd_dms  = 5;   // dm/s
  uint32 hdg_ddeg = 6;   // tenths of a degree
  uint32 sats     = 7;   // satellites used
}

// A run of GNSS positions at a fixed cadence. The anchor is point 0 (absolute);
// dlat[i]/dlon[i]/spd_dms[i] describe point i+1 (i.e. the arrays parallel each
// other and are all the same length = point_count - 1). Deltas are in
// 1e-7-degree units, zigzag varint: small (slow / high-rate) deltas cost 1 B,
// typical driving deltas 2 B. Overflow-free by construction: the firmware
// starts a fresh segment (new anchor) before any delta would exceed a tick's
// real range. A stationary run is simply zero deltas (folds in v2's "repeat"
// entry) -- note a zero point costs 2 B on the wire (1 B in dlat + 1 B in dlon),
// not 1.
//
// spd_dms carries the GNSS-measured (Doppler) speed per point. This is NOT
// derived from the position deltas on the server: at 1 Hz that derivation
// carries ~8 km/h of jitter and at 10 Hz it is unusable (a stationary unit
// would show a phantom ~70 km/h from position noise alone). Doppler speed is
// filtered and costs ~1-2 B/point, so we send it. Being a packed array it may
// be left empty (0 B) in a future low-bandwidth mode; the server then falls
// back to a coarse derived speed.
message TrackSegment {
  GpsFix anchor = 1;
  uint32 dt_ms  = 2;                          // spacing between points
  repeated sint32 dlat    = 3 [packed = true];
  repeated sint32 dlon    = 4 [packed = true];
  repeated uint32 spd_dms = 5 [packed = true]; // GNSS Doppler speed, dm/s
}

// Serving-cell observation (no GNSS, or a stationary keepalive). The server
// resolves this to an approximate location.
message CellFix {
  uint32 mcc      = 1;
  uint32 mnc      = 2;
  uint32 tac      = 3;
  uint32 cell_id  = 4;   // 28-bit ECI
  sint32 rsrp_dbm = 5;
  uint32 act      = 6;   // 3GPP access technology: 7 = LTE-M, 9 = NB-IoT
                         // (0 = unknown / firmware predating the field)
}

// One device log line. level uses Zephyr's numbering (1=ERR 2=WRN 3=INF
// 4=DBG); age_s dates the line the same way observations are dated. Text
// stays plain text: log volume at the uplink threshold is small, and a
// greppable wire beats a tokenizer toolchain.
message LogLine {
  uint32 age_s  = 1;
  uint32 level  = 2;
  string module = 3;
  string text   = 4;
}

message LogBatch {
  repeated LogLine lines = 1;
}

// One item in a batch. age_s ages the anchor (track) or the fix (cell);
// log lines carry their own ages (a batch spans time).
// A thing worth telling a human about, right now. Today the only kind is an
// accelerometer wake on a quiescent tracker: "your asset moved". It jumps the
// uplink queue (prio 0) and rides the urgent flush the FSM transition fires.
message MotionEvent {
  uint32 age_s  = 1;
  uint32 reason = 2;   // 1 = IMU wake
}

message Entry {
  uint32 age_s = 1;
  oneof kind {
    TrackSegment track = 2;
    CellFix      cell  = 3;
    LogBatch     log   = 4;
    MotionEvent  motion = 5;
  }
}

// The datagram. version+device_id are shared by every entry in the batch.
message Obs {
  uint32 version   = 1;   // 3
  string device_id = 2;   // IMEI on hardware, TRACKER_DEVICE_ID on the sim
  repeated Entry entries = 3;
}

// ── A-GNSS (assisted GNSS) ─────────────────────────────────────────────────
//
// The one request/response exchange in the system: the device POSTs an
// AgnssRequest to /agnss and the server answers with AgnssData in the CoAP
// response (the uplink /obs path stays fire-and-forget). Everything numeric
// below is PRE-SCALED BY THE SERVER to exactly the units and ranges of the
// nrf_modem_gnss_agnss_* structs (GPS ICD-200 scale factors): the firmware
// copies fields 1:1 into the modem structs and calls
// nrf_modem_gnss_agnss_write() — no float math on the device, and the
// scaling lives where it is unit-testable against real broadcast data.
// Source: IGS combined broadcast ephemeris (BKG BRDC00WRD, free, ~15 min
// fresh). Keep AgnssData ≤ ~1150 B: one unfragmented datagram.

// Forwarded from the modem's own need report (nrf_modem_gnss_agnss_expiry).
message AgnssRequest {
  string device_id   = 1;  // lets the server pick a location + elevation-filter
  uint32 data_flags  = 2;  // NRF_MODEM_GNSS_AGNSS_*_REQUEST bits
  uint64 sv_mask_ephe = 3; // bit n-1 = PRN n needs ephemeris (informational)
}

// GPS system time, computed from the server's NTP-disciplined clock.
// date_day = days since the GPS epoch (6 Jan 1980); time_full_s/frac_ms =
// GPS time of day (UTC + leap seconds). Semantics identical to Nordic's
// assistance samples.
message AgnssTime {
  uint32 date_day    = 1;
  uint32 time_full_s = 2;
  uint32 time_frac_ms = 3;
}

// Coarse position seed: the device's last known position from the server DB,
// uncertainty inflated with age. Encodings are the 3GPP ones the modem
// expects (lat: deg*2^23/90, lon: deg*2^24/360, unc: K in r=10*(1.1^K-1) m).
message AgnssLocation {
  sint32 latitude      = 1;
  sint32 longitude     = 2;
  sint32 altitude      = 3;  // metres; unc_altitude=255 marks it unknown
  uint32 unc_semimajor = 4;
  uint32 unc_semiminor = 5;
  uint32 unc_altitude  = 6;
  uint32 confidence    = 7;  // percent
}

// GPS-UTC parameters (RINEX header GPUT/LEAP when present).
message AgnssUtc {
  sint32 a1        = 1;  // 2^-50 s/s
  sint32 a0        = 2;  // 2^-30 s
  uint32 tot       = 3;  // 2^12 s
  uint32 wn_t      = 4;  // week mod 256
  sint32 delta_tls = 5;  // leap seconds
  uint32 wn_lsf    = 6;
  sint32 dn        = 7;
  sint32 delta_tlsf = 8;
}

// Klobuchar ionosphere (RINEX header GPSA/GPSB when present).
message AgnssKlobuchar {
  sint32 alpha0 = 1;  // 2^-30 s
  sint32 alpha1 = 2;  // 2^-27 s/sc
  sint32 alpha2 = 3;  // 2^-24 s/sc^2
  sint32 alpha3 = 4;  // 2^-24 s/sc^3
  sint32 beta0  = 5;  // 2^11 s
  sint32 beta1  = 6;  // 2^14 s/sc
  sint32 beta2  = 7;  // 2^16 s/sc^2
  sint32 beta3  = 8;  // 2^16 s/sc^3
}

// One GPS LNAV ephemeris, ICD-200 scaled integers matching
// struct nrf_modem_gnss_agnss_gps_data_ephemeris field-for-field.
message AgnssEphemeris {
  uint32 sv_id     = 1;
  uint32 health    = 2;
  uint32 iodc      = 3;   // 11 bits
  uint32 toc       = 4;   // 2^4 s
  sint32 af2       = 5;   // 2^-55
  sint32 af1       = 6;   // 2^-43
  sint32 af0       = 7;   // 2^-31
  sint32 tgd       = 8;   // 2^-31 s
  uint32 ura       = 9;   // URA index 0..15
  uint32 fit_int   = 10;  // 0: 4 h, 1: >4 h
  uint32 toe       = 11;  // 2^4 s
  sint32 w         = 12;  // 2^-31 semi-circle
  sint32 delta_n   = 13;  // 2^-43 sc/s
  sint32 m0        = 14;  // 2^-31 sc
  sint32 omega_dot = 15;  // 2^-43 sc/s
  uint32 e         = 16;  // 2^-33
  sint32 idot      = 17;  // 2^-43 sc/s
  uint32 sqrt_a    = 18;  // 2^-19 sqrt(m)
  sint32 i0        = 19;  // 2^-31 sc
  sint32 omega0    = 20;  // 2^-31 sc
  sint32 crs       = 21;  // 2^-5 m
  sint32 cis       = 22;  // 2^-29 rad
  sint32 cus       = 23;  // 2^-29 rad
  sint32 crc       = 24;  // 2^-5 m
  sint32 cic       = 25;  // 2^-29 rad
  sint32 cuc       = 26;  // 2^-29 rad
}

// The response payload. Every present element gets its own
// nrf_modem_gnss_agnss_write(); ephemerides are written one element at a
// time (nanopb decode callback — never an array on the stack).
message AgnssData {
  AgnssTime      time      = 1;
  AgnssLocation  location  = 2;
  AgnssUtc       utc       = 3;
  AgnssKlobuchar klobuchar = 4;
  repeated AgnssEphemeris ephemeris = 5;
}
