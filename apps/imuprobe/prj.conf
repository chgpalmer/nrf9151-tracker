# TF-M: minimal profile (no bootloader partition) — matches the tracker app.
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# TF-M builds hard-float; a soft-float app HardFaults at the NS boundary
# (atprobe field lesson — its first flash crashed before the banner).
CONFIG_FPU=y

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL=y

# LIS3DH on the Arduino-header I2C (see boards/ overlay). The st,lis2dh
# driver covers it; the global-thread trigger delivers the any-motion
# interrupt (INT1 -> P0.02). LED1 pulses per interrupt — the demo works
# without a terminal.
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_SENSOR_SHELL=y
CONFIG_SENSOR_INFO=y
CONFIG_LIS2DH_TRIGGER_GLOBAL_THREAD=y
