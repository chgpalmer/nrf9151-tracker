# TF-M: minimal profile (no bootloader partition, boots directly)
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# General
CONFIG_FPU=y
CONFIG_NRF_MODEM_LIB=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Log levels: 0=off 1=err 2=warn 3=inf 4=dbg
CONFIG_GNSS_SAMPLE_LOG_LEVEL_DBG=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_DBG=y
CONFIG_NRF_MODEM_LIB_LOG_LEVEL_DBG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# GNSS assistance: factory almanac + LTE network time injection.
# LTE activated on-demand to fetch assistance, then deactivated for GNSS.
CONFIG_GNSS_SAMPLE_ASSISTANCE_MINIMAL=y

# LTE Link Control
CONFIG_LTE_LINK_CONTROL=y
# APN for initial attach (Velocity IoT VIoT-Flex SIM requires flolive.net)
CONFIG_LTE_LC_PDN_MODULE=y
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=y
CONFIG_LTE_LC_PDN_DEFAULT_APN="flolive.net"
# PSM: LTE sleeps between uplinks so GNSS gets uncontested radio time
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
CONFIG_LTE_PSM_REQ_RAT="00000011"

# Kernel: k_poll used for NMEA/PVT event loop
CONFIG_POLL=y

# Flash/Settings: persistence for assistance_minimal almanac state
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FCB=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_FCB=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
