# GNSS demo config for nrf9151dk/nrf9151/ns
CONFIG_LOG=y

# Nordic modem library (provides GNSS + AT interface)
CONFIG_NRF_MODEM_LIB=y

# Room for modem + GNSS
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# Needed to print lat/long doubles with %f
CONFIG_CBPRINTF_FP_SUPPORT=y

# Dev-time TF-M provisioning so the secure image can derive keys and boot to NS
CONFIG_TFM_DUMMY_PROVISIONING=y
