# TF-M: minimal profile (no bootloader partition, boots directly)
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# General
CONFIG_FPU=y
CONFIG_NRF_MODEM_LIB=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# GNSS assistance: none (standalone, no LTE required)
CONFIG_GNSS_SAMPLE_ASSISTANCE_NONE=y

# LTE Link Control (needed even with no assistance -- GNSS shares the modem)
CONFIG_LTE_LINK_CONTROL=y

# Kernel: k_poll used for NMEA/PVT event loop
CONFIG_POLL=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
