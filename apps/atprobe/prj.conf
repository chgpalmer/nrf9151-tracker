# TF-M: minimal profile (no bootloader partition) — matches the tracker app.
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# TF-M builds hard-float ("Float ABI: Hard" in its banner); a soft-float
# app HardFaults at the NS boundary. Field lesson: this app's first flash
# crashed before the Zephyr banner.
CONFIG_FPU=y

CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Modem + the `at` shell passthrough — and NOTHING that drives the radio.
# No link control, no GNSS, no sockets: manual procedures like the
# AT+COPS=? carrier scan get the modem to themselves.
CONFIG_NRF_MODEM_LIB=y
CONFIG_SHELL=y
CONFIG_AT_SHELL=y

# AT syntax is full of `?`, which the Zephyr shell treats as a wildcard
# and eats before the at command sees it (field lesson: the scan command
# silently became a usage printout). No wildcards on a probe console.
CONFIG_SHELL_WILDCARD=n

CONFIG_HEAP_MEM_POOL_SIZE=8192
