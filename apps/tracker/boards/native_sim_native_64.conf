# native_sim/native/64: NSOS — zsock_* run against the host kernel.
# No TAP interface, no root, no net-setup required.

# Disable real modem — link-seam mocks fill all missing symbols
CONFIG_NRF_MODEM_LIB=n
CONFIG_LTE_LINK_CONTROL=n
CONFIG_TFM_PROFILE_TYPE_MINIMAL=n

# hw_id: real library needs the modem; mock provides hw_id_get() instead
CONFIG_HW_ID_LIBRARY=n
CONFIG_HW_ID_LIBRARY_SOURCE_IMEI=n

# Suppress prj.conf LTE/modem symbols that don't exist without LTE_LINK_CONTROL
CONFIG_LTE_LC_PSM_MODULE=n
CONFIG_LTE_LC_PDN_MODULE=n
CONFIG_LTE_PSM_REQ=n
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=n

# Disable hardware-specific configs not valid on host
CONFIG_FPU=n
CONFIG_UART_INTERRUPT_DRIVEN=n

# NSOS networking: offload sockets to host BSD socket calls
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_L2_ETHERNET=n
CONFIG_NET_IPV6_DAD=n

# RAI is modem-only; suppress the prj.conf symbols (LTE_LINK_CONTROL=n here)
CONFIG_LTE_LC_RAI_MODULE=n
CONFIG_LTE_RAI_REQ=n

# at_monitor needs real modem headers; %XSIM timing is hardware-only.
CONFIG_AT_MONITOR=n

# Flight recorder on the host: sim-flash driver backs the flight_log
# partition (see the .overlay). RAM-backed per run; --flash_in=/--flash=
# args persist it across "reboots" when a test wants that.
CONFIG_FLASH_SIMULATOR=y
