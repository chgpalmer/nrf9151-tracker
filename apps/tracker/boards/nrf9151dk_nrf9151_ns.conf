# DK-only drivers for the flight recorder's flash: the GD25WB256 NOR hangs
# off SPI3 (see the overlay). SFDP parameters come from the devicetree
# sfdp-bfp blob the board dts ships — no runtime SFDP read on every boot.
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

# guard (src/sys/guard.c): task watchdog on the main loop + labeled reboots.
# Hardware-only: two field freezes (2026-07-17, 2026-07-21) wedged the loop
# and modem callbacks at 12-14 h uptime with nothing to catch it. native_sim
# stays unguarded (sys_reboot there ends the process; the sim's failure
# modes are ours to see live).
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
CONFIG_REBOOT=y
# A modem-core crash reboots the SoC with a named note instead of leaving
# every nrf_modem call blocking forever (the default is DO_NOTHING).
CONFIG_NRF_MODEM_LIB_ON_FAULT_APPLICATION_SPECIFIC=y
