# TF-M: minimal profile (no bootloader partition)
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# General
CONFIG_FPU=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PICOLIBC_IO_FLOAT=y

# Logging. Compile-in DBG for our modules (4): UART shows the full chatter,
# the uplink backend's own INF threshold keeps it off the wire, and the
# shell's `log` commands (LOG_CMDS) adjust levels at runtime.
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_TRACKER_LOG_LEVEL=4
CONFIG_LOG_CMDS=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_INF=y
CONFIG_NRF_MODEM_LIB_LOG_LEVEL_WRN=y

# Modem
CONFIG_NRF_MODEM_LIB=y

# RAT preference: NB-IoT first. Modem-trace forensics (2026-07-12, on the
# tested setup: an NB-IoT-only roaming profile) showed the default
# LTE-M-first preference makes every boot hunt LTE-M, fail, and sleep
# ~60 s before trying NB — the whole "attach wall". Both RATs stay
# ENABLED (PLMN priority keeps roaming sane where LTE-M exists); only the
# search order flips, so this default is harmless on LTE-M networks too.
CONFIG_LTE_MODE_PREFERENCE_NBIOT_PLMN_PRIO=y

# Device ID: use the modem IMEI
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_IMEI=y

# LTE Link Control: persistent connection. The SIM-provider APN is NOT
# hardcoded here — set TRACKER_APN in .env (see mk/fw.mk); empty uses the
# SIM's own default APN.
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
CONFIG_LTE_PSM_REQ_RAT="00000011"
CONFIG_LTE_LC_PDN_MODULE=y
# Modem observability: %MDMEV events (search phases, reset loops, CE level)
# surface as LTE_LC_EVT_MODEM_EVENT and ship over the log uplink — the
# fine-grained view of what "searching" is actually doing.
CONFIG_LTE_LC_MODEM_EVENTS_MODULE=y
# Search-scheduling experiment: front-load retry attempts after a failed
# boot search (measured: light search fails at +9 s, modem then idles ~60 s
# before the full search that succeeds in 6 s).
CONFIG_LTE_LC_PERIODIC_SEARCH_MODULE=y
# %XSIM notifications time SIM readiness — attributes the boot gap.
CONFIG_AT_MONITOR=y

# RAI: SO_RAI(RAI_LAST) goes on the CoAP UDP socket right before each send, so
# the modem asks the network to release RRC as soon as the datagram is out.
# Over UDP nothing comes back, so the release really is immediate (unlike the
# old TCP path, where the broker's ACK held RRC up afterwards).
CONFIG_LTE_LC_RAI_MODULE=y
CONFIG_LTE_RAI_REQ=y

# Networking: offloaded IP via modem (UDP only — no TCP since MQTT left)
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE=n
CONFIG_NET_IPV4=y
CONFIG_POSIX_API=y

# CoAP over UDP: non-confirmable POSTs for observations, confirmable for the
# A-GNSS exchange; protobuf payloads (proto/tracker.proto, encoded with
# nanopb). No connection and no keepalive — UDP is silent between sends,
# which is what keeps GNSS acquisition windows intact without any keepalive
# tuning.
CONFIG_COAP=y
CONFIG_NANOPB=y

# State at a glance on the DK's four user LEDs (see src/ui/leds.h).
CONFIG_GPIO=y

# Shell on the console: runtime per-module log levels (`log enable dbg
# loc_fsm`) — the clear/set-level/test/inspect workflow with no custom
# protocol. Runtime filtering is what makes the `log` commands real.
CONFIG_SHELL=y
CONFIG_LOG_RUNTIME_FILTERING=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
