# TF-M: minimal profile (no bootloader partition)
CONFIG_TFM_PROFILE_TYPE_MINIMAL=y

# General
CONFIG_FPU=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PICOLIBC_IO_FLOAT=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_TRACKER_LOG_LEVEL=3
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_INF=y
CONFIG_NRF_MODEM_LIB_LOG_LEVEL_WRN=y

# Modem
CONFIG_NRF_MODEM_LIB=y

# Device ID: use the modem IMEI
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_IMEI=y

# LTE Link Control: persistent connection, APN for Velocity IoT SIM
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
CONFIG_LTE_PSM_REQ_RAT="00000011"
CONFIG_LTE_LC_PDN_MODULE=y
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=y
CONFIG_LTE_LC_PDN_DEFAULT_APN="flolive.net"
# RAI: after each publish the app sets SO_RAI on the MQTT socket so the modem
# asks the network to release RRC immediately instead of idling through the
# inactivity timer. Shorter RRC tail = longer GNSS windows.
CONFIG_LTE_LC_RAI_MODULE=y
CONFIG_LTE_RAI_REQ=y

# Networking: offloaded TCP/IP via modem
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE=n
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_POSIX_API=y

# MQTT
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_HELPER_PAYLOAD_BUFFER_LEN=512
# LOAD-BEARING: must exceed TRACKER_LOC_ACQUIRE_TIMEOUT_S (300). The client is
# publish-only and stays connected while GNSS hunts ephemeris in radio silence;
# a keepalive PINGREQ inside that window would chop it and restart the hunt.
# The old default (60) is exactly how GNSS never got a fix.
CONFIG_MQTT_KEEPALIVE=900

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
